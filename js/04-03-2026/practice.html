<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" value="Hello World" oncopy="copyEvent()">
    <input type="text" value="Cut this text" oncut="cutEvent()">
    <input type="text" onpaste="pasteEvent()">



<script>
function copyEvent() {
    console.log("Text Copied!");
}
</script>



<script>
function pasteEvent() {
    console.log("Text Pasted!");
}
</script>

<script>
function cutEvent() {
    console.log("Text Cut!");
}
</script>
</body>
</html>
