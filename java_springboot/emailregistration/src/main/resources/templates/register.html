<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
<meta charset="UTF-8"/>
<title>Register</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',sans-serif; background:#F1F8E9;
display:flex; align-items:center; justify-content:center;
min-height:100vh; }
.card { background:#fff; border-radius:16px; padding:40px;
width:440px; box-shadow:0 8px 32px rgba(0,0,0,0.10); }
.card h1 { color:#2E7D32; font-size:24px; margin-bottom:6px; }
.card p { color:#777; font-size:14px; margin-bottom:28px; }
label { display:block; font-size:13px; color:#555;
font-weight:600; margin-bottom:4px; }
input { width:100%; padding:11px 14px; border:1.5px solid #C8E6C9;
border-radius:8px; font-size:14px; margin-bottom:16px;
transition:border-color .2s; outline:none; }
input:focus { border-color:#6DB33F; }
.row { display:flex; gap:12px; }
.row > div { flex:1; }
button { width:100%; padding:13px;
background:linear-gradient(135deg,#6DB33F,#2E7D32);
color:#fff; border:none; border-radius:30px;
font-size:15px; font-weight:700; cursor:pointer; }
.error { background:#FFEBEE; color:#C62828;
border:1px solid #EF9A9A; border-radius:8px;
padding:12px 16px; margin-bottom:18px; font-size:14px; }
</style>
</head>
<body>
<div class="card">
<h1>Create Account</h1>
<p>Fill in your details and we'll send a confirmation email.</p>
<div class="error" th:if="${error}" th:text="${error}"></div>
<form th:action="@{/register}" th:object="${user}" method="post">
<div class="row">
<div>
<label>First Name</label>
<input type="text" th:field="*{firstName}"
placeholder="John" required/>
</div>
<div>
<label>Last Name</label>
<input type="text" th:field="*{lastName}"
placeholder="Doe" required/>
</div>
</div>
<label>Username</label>
<input type="text" th:field="*{username}"
placeholder="johndoe" required/>
<label>Email Address</label>
<input type="email" th:field="*{email}"
placeholder="john@example.com" required/>
<label>Password</label>
<input type="password" th:field="*{password}"
placeholder="Min 6 characters" required minlength="6"/>
<button type="submit">Register &amp; Send Confirmation</button>
</form>
</div>
</body>
</html>
