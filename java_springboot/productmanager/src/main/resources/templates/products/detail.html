<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Product Detail</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:640px;">
<a th:href="@{/products}" class="btn btn-sm btn-outline-secondary mb-3">
&larr; Back to list
</a>
<div class="card shadow-sm">
<img th:if="${product.imagePath}"
th:src="${product.imagePath}"
class="card-img-top"
style="max-height:320px; object-fit:cover;"/>
<div class="card-body">
<h4 class="card-title" th:text="${product.name}"></h4>
<p class="text-muted" th:text="${product.description}"></p>
<table class="table table-sm">
<tr><th>Price</th>
<td th:text="'$' + ${product.price}"></td></tr>
<tr><th>Quantity</th>
<td th:text="${product.quantity}"></td></tr>
<tr><th>Image path (DB)</th>
<td th:text="${product.imagePath}"></td></tr>
</table>
<div class="d-flex gap-2 mt-3">
<a th:href="@{/products/{id}/edit(id=${product.id})}"
class="btn btn-warning">Edit</a>
<form th:action="@{/products/{id}/delete(id=${product.id})}"
method="post"
onsubmit="return confirm('Delete?')">
<button class="btn btn-danger">Delete</button>
</form>
</div>
</div>
</div>
</div>
</body>
</html>
