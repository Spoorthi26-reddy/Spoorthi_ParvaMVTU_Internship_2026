<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Products</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4">
<!-- Flash Message -->
<div th:if="${successMsg}" class="alert alert-success"
th:text="${successMsg}"></div>
<div class="d-flex justify-content-between align-items-center mb-3">
<h2>Products</h2>
<a th:href="@{/products/new}" class="btn btn-success">+ Add Product</a>
</div>
<!-- Search form -->
<form th:action="@{/products}" method="get" class="mb-3 d-flex gap-2">
<input type="text" name="keyword" class="form-control w-auto"
placeholder="Search by name..." th:value="${keyword}"/>
<button class="btn btn-outline-secondary">Search</button>
<a th:href="@{/products}" class="btn btn-outline-danger">Clear</a>
</form>
<!-- Products Table -->
<table class="table table-bordered table-hover bg-white shadow-sm">
<thead class="table-success">
<tr>
<th>#</th><th>Image</th><th>Name</th>
<th>Price</th><th>Qty</th><th>Actions</th>
</tr>
</thead>
<tbody>
<tr th:each="p : ${products}">
<td th:text="${p.id}"></td>
<td>
<img th:if="${p.imagePath}" th:src="${p.imagePath}"
width="60" height="60"
style="object-fit:cover; border-radius:4px;"/>
<span th:unless="${p.imagePath}"
class="text-muted small">No image</span>
</td>
<td th:text="${p.name}"></td>
<td th:text="'$' + ${p.price}"></td>
<td th:text="${p.quantity}"></td>
<td>
<a th:href="@{/products/{id}(id=${p.id})}"
class="btn btn-sm btn-info">View</a>
<a th:href="@{/products/{id}/edit(id=${p.id})}"
class="btn btn-sm btn-warning">Edit</a>
<form th:action="@{/products/{id}/delete(id=${p.id})}"
method="post" style="display:inline"
onsubmit="return confirm('Delete this product?')">
<button class="btn btn-sm btn-danger">Delete</button>
</form>
</td>
</tr>
<tr th:if="${#lists.isEmpty(products)}">
<td colspan="6" class="text-center text-muted">No products found.</td>
</tr>
</tbody>
</table>
</div>
</body>
</html>
