<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Product Form</title>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div class="container mt-4" style="max-width:600px;">
<h2 th:text="${product.id == null ? 'New Product' : 'Edit Product'}"></h2>
<hr/>
<!-
IMPORTANT: enctype="multipart/form-data" is REQUIRED for file upload.
Action switches between POST /products (create) and POST /products/{id} (update).-->
<form th:action="${product.id == null
? '/products'
: '/products/' + product.id}"
th:object="${product}"
method="post"
enctype="multipart/form-data"
class="bg-white p-4 rounded shadow-sm">
<!-- Name -->
<div class="mb-3">
<label class="form-label fw-bold">Name *</label>
<input type="text" th:field="*{name}"
class="form-control"
th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"/>
<div class="invalid-feedback" th:errors="*{name}"></div>
</div>
<!-- Description -->
<div class="mb-3">
<label class="form-label fw-bold">Description</label>
<textarea th:field="*{description}"
class="form-control" rows="3"></textarea>
</div>
<!-- Price -->
<div class="mb-3">
<label class="form-label fw-bold">Price *</label>
<input type="number" th:field="*{price}"
step="0.01" class="form-control"
th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"/>
<div class="invalid-feedback" th:errors="*{price}"></div>
</div>
<!-- Quantity -->
<div class="mb-3">
<label class="form-label fw-bold">Quantity</label>
<input type="number" th:field="*{quantity}" class="form-control"/>
</div>
<!-- Image Upload -->
<div class="mb-3">
<label class="form-label fw-bold">Product Image</label>
<!-- Show existing image when editing -->
<div th:if="${product.imagePath}" class="mb-2">
<img th:src="${product.imagePath}"
style="max-width:120px; border-radius:4px;"/>
<p class="text-muted small mt-1">Upload a new image to replace this one.</p>
</div>
<input type="file" name="imageFile"
class="form-control" accept="image/*"/>
<div class="form-text">Accepted: JPG, PNG, GIF, WebP (max 10 MB)</div>
</div>
<div class="d-flex gap-2">
<button type="submit" class="btn btn-success">
<span th:text="${product.id == null ? 'Create' : 'Update'}"></span>
</button>
<a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
</div>
</form>
</div>
</body>
</html>
