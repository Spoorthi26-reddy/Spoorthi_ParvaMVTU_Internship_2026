<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Fine List</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2>Fine Management</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">Dashboard</a>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Book</th>
            <th>Student</th>
            <th>Days Overdue</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Created At</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="fine : ${fines}">
            <td th:text="${fine.id}"></td>
            <td th:text="${fine.bookIssue.book.title}"></td>
            <td th:text="${fine.bookIssue.student.name}"></td>
            <td th:text="${fine.daysOverdue}"></td>
            <td th:text="${fine.amount}"></td>

            <td>
                <span th:if="${fine.paidStatus == 'UNPAID'}"
                      class="badge bg-danger">
                    UNPAID
                </span>

                <span th:if="${fine.paidStatus == 'PAID'}"
                      class="badge bg-success">
                    PAID
                </span>
            </td>

            <td th:text="${fine.createdAt}"></td>

            <td>
                <a th:if="${fine.paidStatus == 'UNPAID'}"
                   th:href="@{/fines/paid/{id}(id=${fine.id})}"
                   class="btn btn-success btn-sm">
                    Mark Paid
                </a>

                <span th:if="${fine.paidStatus == 'PAID'}"
                      class="text-success fw-bold">
                    Completed
                </span>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
