<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Library Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          rel="stylesheet">
</head>

<body style="background:#f4f7fb;">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <div class="card shadow-lg border-0">

        <div class="card-header bg-dark text-white">
            <h3>
                <i class="fa-solid fa-gear"></i>
                Library Settings
            </h3>
        </div>

        <div class="card-body">

            <div th:if="${param.success}" class="alert alert-success">
                Settings updated successfully.
            </div>

            <form th:action="@{/settings/save}"
                  th:object="${settings}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Fine Per Day</label>

                    <input type="number"
                           step="0.01"
                           th:field="*{finePerDay}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Maximum Books Per Student</label>

                    <input type="number"
                           th:field="*{maxBooksPerStudent}"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Maximum Issue Days</label>

                    <input type="number"
                           th:field="*{maxIssueDays}"
                           class="form-control"
                           required>
                </div>

                <button type="submit" class="btn btn-primary">
                    Save Settings
                </button>

                <a href="/" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
