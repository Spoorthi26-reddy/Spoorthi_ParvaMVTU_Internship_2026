<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Books</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2>Book List</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">Dashboard</a>

    <a th:href="@{/books/add}" class="btn btn-primary mb-3">Add Book</a>

    <form th:action="@{/books/search}" method="get" class="mb-3">

        <div class="row">

            <div class="col-md-6">

                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Search books by title"
                       required>

            </div>

            <div class="col-md-2">

                <button type="submit" class="btn btn-dark">
                    Search
                </button>

            </div>

            <div class="col-md-2">

                <a th:href="@{/books}" class="btn btn-outline-secondary">
                    Reset
                </a>

            </div>

        </div>

    </form>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Author</th>
            <th>ISBN</th>
            <th>Category</th>
            <th>Total Copies</th>
            <th>Available Copies</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(books)}">
            <td colspan="8" class="text-center text-danger fw-bold">
                No Books Found
            </td>
        </tr>

        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.author}"></td>
            <td th:text="${book.isbn}"></td>
            <td th:text="${book.category}"></td>
            <td th:text="${book.totalCopies}"></td>
            <td th:text="${book.availableCopies}"></td>

            <td>
                <a th:href="@{/books/edit/{id}(id=${book.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/books/delete/{id}(id=${book.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this book?')">
                    Delete
                </a>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
