<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Book</h2>

    <form th:action="@{/books/update/{id}(id=${book.id})}"
          th:object="${book}"
          method="post">

        <div class="mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Author</label>
            <input type="text" th:field="*{author}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Publisher</label>
            <input type="text" th:field="*{publisher}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" th:field="*{category}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Total Copies</label>
            <input type="number" th:field="*{totalCopies}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Available Copies</label>
            <input type="number" th:field="*{availableCopies}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Shelf Location</label>
            <input type="text" th:field="*{shelfLocation}" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Update Book</button>

        <a th:href="@{/books}" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
