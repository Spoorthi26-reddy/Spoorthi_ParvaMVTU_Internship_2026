<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2>Add Book</h2>

    <form th:action="@{/books/save}" th:object="${book}" method="post">

        <div class="mb-3">
            <label>Title</label>
            <input type="text" th:field="*{title}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Author</label>
            <input type="text" th:field="*{author}" class="form-control">
        </div>

        <div class="mb-3">
            <label>ISBN</label>
            <input type="text" th:field="*{isbn}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Publisher</label>
            <input type="text" th:field="*{publisher}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Category</label>
            <input type="text" th:field="*{category}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Total Copies</label>
            <input type="number" th:field="*{totalCopies}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Available Copies</label>
            <input type="number" th:field="*{availableCopies}" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">
            Save Book
        </button>

    </form>

</div>

</body>
</html>
