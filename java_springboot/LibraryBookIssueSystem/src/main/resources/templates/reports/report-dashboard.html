<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reports</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2>Library Reports Dashboard</h2>

    <div class="row mt-4">

        <div class="col-md-3">
            <div class="card text-bg-primary mb-3">
                <div class="card-body text-center">
                    <h5>Total Books</h5>
                    <h2 th:text="${#lists.size(books)}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-success mb-3">
                <div class="card-body text-center">
                    <h5>Total Students</h5>
                    <h2 th:text="${#lists.size(students)}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-warning mb-3">
                <div class="card-body text-center">
                    <h5>Total Issues</h5>
                    <h2 th:text="${#lists.size(issues)}">0</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-bg-danger mb-3">
                <div class="card-body text-center">
                    <h5>Total Fines</h5>
                    <h2 th:text="${#lists.size(fines)}">0</h2>
                </div>
            </div>
        </div>

    </div>

    <hr>

    <h4 class="mt-4">Issued Book Report</h4>

    <table class="table table-bordered table-striped mt-3">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Book</th>
            <th>Student</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Return Date</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(issues)}">
            <td colspan="7" class="text-center text-danger fw-bold">
                No Issue Records Found
            </td>
        </tr>

        <tr th:each="issue : ${issues}">
            <td th:text="${issue.id}"></td>
            <td th:text="${issue.book.title}"></td>
            <td th:text="${issue.student.name}"></td>
            <td th:text="${issue.issueDate}"></td>
            <td th:text="${issue.dueDate}"></td>
            <td th:text="${issue.returnDate}"></td>
            <td th:text="${issue.status}"></td>
        </tr>

        </tbody>

    </table>

    <h4 class="mt-5">Fine Report</h4>

    <table class="table table-bordered table-striped mt-3">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Book</th>
            <th>Student</th>
            <th>Days Overdue</th>
            <th>Amount</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(fines)}">
            <td colspan="6" class="text-center text-danger fw-bold">
                No Fine Records Found
            </td>
        </tr>

        <tr th:each="fine : ${fines}">
            <td th:text="${fine.id}"></td>
            <td th:text="${fine.bookIssue.book.title}"></td>
            <td th:text="${fine.bookIssue.student.name}"></td>
            <td th:text="${fine.daysOverdue}"></td>
            <td th:text="${fine.amount}"></td>
            <td th:text="${fine.paidStatus}"></td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
