<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2>Edit Student</h2>

    <form th:action="@{/students/update/{id}(id=${student.id})}"
          th:object="${student}"
          method="post">

        <div class="mb-3">
            <label>Student Code</label>
            <input type="text" th:field="*{studentCode}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Phone</label>
            <input type="text" th:field="*{phone}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Department</label>
            <input type="text" th:field="*{department}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Year</label>
            <input type="number" th:field="*{year}" class="form-control">
        </div>

        <div class="mb-3">
            <label>Status</label>
            <select th:field="*{status}" class="form-control">
                <option value="ACTIVE">ACTIVE</option>
                <option value="INACTIVE">INACTIVE</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Update Student</button>

        <a th:href="@{/students}" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
