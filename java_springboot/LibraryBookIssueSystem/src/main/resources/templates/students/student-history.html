<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>My Borrow History</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>

        body{
            background:#f4f6fb;
            font-family:'Segoe UI',sans-serif;
        }

        .header-box{
            background:linear-gradient(135deg,#4f46e5,#2563eb);
            color:white;
            padding:35px;
            border-radius:20px;
            margin-bottom:30px;
        }

        .table-card{
            background:white;
            border-radius:18px;
            padding:25px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

    </style>

</head>

<body>

<div class="container mt-4">

    <div class="header-box">

        <h2>My Borrow History</h2>

        <p>
            View issued and returned books
        </p>

        <a th:href="@{/student/dashboard}"
           class="btn btn-light">

            Back

        </a>

    </div>

    <div class="table-card">

        <table class="table table-bordered table-striped">

            <thead class="table-dark">

            <tr>

                <th>Book Name</th>
                <th>Student Name</th>
                <th>Issue Date</th>
                <th>Due Date</th>
                <th>Return Date</th>
                <th>Status</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="issue : ${issues}">

                <td th:text="${issue.book.title}"></td>

                <td th:text="${issue.student.name}"></td>

                <td th:text="${issue.issueDate}"></td>

                <td th:text="${issue.dueDate}"></td>

                <td th:text="${issue.returnDate != null ? issue.returnDate : 'Not Returned'}"></td>

                <td>

                    <span class="badge bg-success"
                          th:if="${issue.status == 'RETURNED'}">

                        Returned

                    </span>

                    <span class="badge bg-warning text-dark"
                          th:if="${issue.status == 'ISSUED'}">

                        Issued

                    </span>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
