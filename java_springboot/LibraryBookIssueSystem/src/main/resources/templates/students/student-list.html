<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Students</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2>Student List</h2>

    <a th:href="@{/dashboard}" class="btn btn-secondary mb-3">Dashboard</a>

    <a th:href="@{/students/add}" class="btn btn-primary mb-3">Add Student</a>

    <form th:action="@{/students/search}" method="get" class="mb-3">

        <div class="row">

            <div class="col-md-6">
                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Search students by name"
                       required>
            </div>

            <div class="col-md-2">
                <button type="submit" class="btn btn-dark">
                    Search
                </button>
            </div>

            <div class="col-md-2">
                <a th:href="@{/students}" class="btn btn-outline-secondary">
                    Reset
                </a>
            </div>

        </div>

    </form>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Student Code</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Department</th>
            <th>Year</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="9" class="text-center text-danger fw-bold">
                No Students Found
            </td>
        </tr>

        <tr th:each="student : ${students}">
            <td th:text="${student.id}"></td>
            <td th:text="${student.studentCode}"></td>
            <td th:text="${student.name}"></td>
            <td th:text="${student.email}"></td>
            <td th:text="${student.phone}"></td>
            <td th:text="${student.department}"></td>
            <td th:text="${student.year}"></td>
            <td th:text="${student.status}"></td>

            <td>
            	<a th:href="@{/students/history/{id}(id=${student.id})}"
   					class="btn btn-info btn-sm">
   					 History
				</a>
            	
                <a th:href="@{/students/edit/{id}(id=${student.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/students/delete/{id}(id=${student.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this student?')">
                    Delete
                </a>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
