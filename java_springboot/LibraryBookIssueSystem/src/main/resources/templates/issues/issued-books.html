<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Issued Books</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>
<div class="container mt-5">

    <h2>Issued Books / Transactions</h2>

    <a th:href="@{/}" class="btn btn-secondary mb-3">
        Dashboard
    </a>

    <a th:href="@{/issues/add}" class="btn btn-primary mb-3">
        Issue New Book
    </a>

    <a th:href="@{/fines}" class="btn btn-warning mb-3">
        View Fines
    </a>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Book</th>
            <th>Student</th>
            <th>Issue Date</th>
            <th>Due Date</th>
            <th>Return Date</th>
            <th>Status</th>
            <th>Issued By</th>
            <th>Actions</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="issue : ${issues}">

            <td th:text="${issue.id}"></td>

            <td th:text="${issue.book.title}"></td>

            <td th:text="${issue.student.name}"></td>

            <td th:text="${issue.issueDate}"></td>

            <td th:text="${issue.dueDate}"></td>

            <td th:text="${issue.returnDate}"></td>

            <td>

                <span th:if="${issue.status == 'ISSUED'}"
                      class="badge bg-warning text-dark">

                    ISSUED

                </span>

                <span th:if="${issue.status == 'RETURNED'}"
                      class="badge bg-success">

                    RETURNED

                </span>

            </td>

            <td th:text="${issue.issuedBy}"></td>

            <td>

                <a th:if="${issue.status == 'ISSUED'}"
                   th:href="@{/issues/return/{id}(id=${issue.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Confirm book return?')">

                    Return

                </a>

                <a th:href="@{/fines/calculate/{id}(id=${issue.id})}"
                   class="btn btn-warning btn-sm">

                    Calculate Fine

                </a>

                <span th:if="${issue.status == 'RETURNED'}"
                      class="text-success fw-bold">

                    Completed

                </span>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
